# Development-only local stack.
# For staging deployment (backend + frontend + Cloudflare tunnel), use
# ./scripts/deploy.sh with docker-compose.staging.yml — never `docker compose up` directly.
services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./.db:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - app-network

  backend:
    build: .
    # Dev only: override the image CMD to enable hot-reload (code is bind-mounted below).
    # Prod uses the Dockerfile CMD (no --reload).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - SQLALCHEMY_DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/postgres
      - SECRET_KEY=your-secret-key-for-local-dev
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./Frontend
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}

      API_BASE_URL: http://backend:8000/api
      GRAPHQL_URL: http://backend:8000/graphql

      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LINE_CLIENT_ID: ${LINE_CLIENT_ID}
      LINE_CLIENT_SECRET: ${LINE_CLIENT_SECRET}
    depends_on:
      - backend
    ports:
      - "3000:3000"

networks:
  app-network:
    driver: bridge
