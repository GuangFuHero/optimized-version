services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - backend-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    environment:
      ENV: production
      SQLALCHEMY_DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      SECRET_KEY: ${BACKEND_SECRET_KEY}
      REDIS_URL: redis://redis:6379
      APP_BASE_URL: ${APP_BASE_URL}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@disaster-rescue.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Disaster Rescue}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMTP2GO_API_KEY: ${SMTP2GO_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      LINE_CHANNEL_ID: ${LINE_CLIENT_ID:-}
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      API_BASE_URL: http://backend:8000/api
      GRAPHQL_URL: http://backend:8000/graphql
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      LINE_CLIENT_ID: ${LINE_CLIENT_ID:-}
      LINE_CLIENT_SECRET: ${LINE_CLIENT_SECRET:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - app-network

volumes:
  backend-db-data:

networks:
  app-network:
    driver: bridge
